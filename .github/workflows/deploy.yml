name: Build and Deploy to Cloud Run

on:
  push:
    branches: [main, develop]

env:
  REGISTRY: asia-northeast3-docker.pkg.dev
  PROJECT_ID: helical-ion-460310-m0
  REPOSITORY: test
  IMAGE_NAME: trinity-server
  REGION: asia-northeast3

jobs:
  # ──────────────────────────────────────
  # 0. 사전 검증 + 시작 알림
  # ──────────────────────────────────────
  validate:
    runs-on: self-hosted
    steps:
      - name: Notify Telegram (start)
        shell: bash
        run: |
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "parse_mode=HTML" \
            --data-urlencode "text=🚀 <b>Build Started</b>
          Repo: ${{ github.repository }}
          Branch: <code>${{ github.ref_name }}</code>
          Actor: ${{ github.actor }}
          Commit: ${{ github.event.head_commit.message }}
          Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Check required secrets
        shell: bash
        run: |
          MISSING=""
          if [ -z "${{ secrets.GCP_SA_KEY }}" ]; then
            MISSING="${MISSING}\n  - GCP_SA_KEY"
          fi

          BRANCH=${GITHUB_REF_NAME}
          if [ "$BRANCH" = "develop" ]; then
            PREFIX="DEV"
          elif [ "$BRANCH" = "main" ]; then
            PREFIX="PROD"
          fi

          if [ -z "${{ secrets.DEV_DB_URL }}${{ secrets.PROD_DB_URL }}" ]; then
            MISSING="${MISSING}\n  - ${PREFIX}_DB_URL"
          fi
          if [ -z "${{ secrets.DEV_DB_USER }}${{ secrets.PROD_DB_USER }}" ]; then
            MISSING="${MISSING}\n  - ${PREFIX}_DB_USER"
          fi
          if [ -z "${{ secrets.DEV_DB_PASSWORD }}${{ secrets.PROD_DB_PASSWORD }}" ]; then
            MISSING="${MISSING}\n  - ${PREFIX}_DB_PASSWORD"
          fi

          if [ -n "$MISSING" ]; then
            echo "::error::필수 Secret이 설정되지 않았습니다:${MISSING}"
            exit 1
          fi
          echo "All required secrets are set."

  # ──────────────────────────────────────
  # 1. 빌드 + Registry push (공통)
  # ──────────────────────────────────────
  build:
    needs: validate
    runs-on: self-hosted
    outputs:
      deploy_image: ${{ steps.config.outputs.deploy_image }}
      service_name: ${{ steps.config.outputs.service_name }}
      tags: ${{ steps.config.outputs.tags }}


    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set image tags and environment
        id: config
        shell: bash
        run: |
          FULL_IMAGE="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}"
          SHORT_SHA=${GITHUB_SHA::7}
          BRANCH=${GITHUB_REF_NAME}

          TAGS="${FULL_IMAGE}:${SHORT_SHA}"

          if [ "$BRANCH" = "main" ]; then
            TAGS="${TAGS},${FULL_IMAGE}:latest"
            VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            if [ -n "$VERSION" ]; then
              TAGS="${TAGS},${FULL_IMAGE}:${VERSION}"
            fi
            echo "service_name=trinity-server-prod" >> "$GITHUB_OUTPUT"
          elif [ "$BRANCH" = "develop" ]; then
            TAGS="${TAGS},${FULL_IMAGE}:dev-latest"
            TAGS="${TAGS},${FULL_IMAGE}:dev-${SHORT_SHA}"
            echo "service_name=trinity-server-dev" >> "$GITHUB_OUTPUT"
          fi

          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "deploy_image=${FULL_IMAGE}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "Generated tags: ${TAGS}"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        shell: bash
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build Docker image
        shell: bash
        run: |
          IFS=',' read -ra TAG_ARRAY <<< "${{ steps.config.outputs.tags }}"
          BUILD_ARGS=""
          for tag in "${TAG_ARRAY[@]}"; do
            BUILD_ARGS="${BUILD_ARGS} -t ${tag}"
          done
          docker build ${BUILD_ARGS} .

      - name: Push Docker image
        shell: bash
        run: |
          IFS=',' read -ra TAG_ARRAY <<< "${{ steps.config.outputs.tags }}"
          for tag in "${TAG_ARRAY[@]}"; do
            docker push "${tag}"
          done

  # ──────────────────────────────────────
  # 2. develop → 자동 배포
  # ──────────────────────────────────────
  deploy-dev:
    needs: build
    if: github.ref_name == 'develop'
    runs-on: self-hosted

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to Cloud Run (dev)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ needs.build.outputs.service_name }}
          image: ${{ needs.build.outputs.deploy_image }}
          region: ${{ env.REGION }}
          env_vars: |
            APP_ENV=develop
            DB_URL=${{ secrets.DEV_DB_URL }}
            DB_USER=${{ secrets.DEV_DB_USER }}
            DB_PASSWORD=${{ secrets.DEV_DB_PASSWORD }}
            DB_POOL_SIZE=${{ secrets.DEV_DB_POOL_SIZE }}
            UGS_PROJECT_ID=${{ secrets.UGS_PROJECT_ID }}
            UGS_ISSUER=${{ secrets.UGS_ISSUER }}
            UGS_JWKS_URL=${{ secrets.UGS_JWKS_URL }}

  # ──────────────────────────────────────
  # 3. main → 수동 승인 후 배포
  # ──────────────────────────────────────
  deploy-prod:
    needs: build
    if: github.ref_name == 'main'
    runs-on: self-hosted
    environment: production  # GitHub 환경 보호 규칙 → 승인 필요

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to Cloud Run (prod)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ needs.build.outputs.service_name }}
          image: ${{ needs.build.outputs.deploy_image }}
          region: ${{ env.REGION }}
          env_vars: |
            APP_ENV=production
            DB_URL=${{ secrets.PROD_DB_URL }}
            DB_USER=${{ secrets.PROD_DB_USER }}
            DB_PASSWORD=${{ secrets.PROD_DB_PASSWORD }}
            DB_POOL_SIZE=${{ secrets.PROD_DB_POOL_SIZE }}
            UGS_PROJECT_ID=${{ secrets.UGS_PROJECT_ID }}
            UGS_ISSUER=${{ secrets.UGS_ISSUER }}
            UGS_JWKS_URL=${{ secrets.UGS_JWKS_URL }}

  # ──────────────────────────────────────
  # 4. 결과 알림 (성공/실패)
  # ──────────────────────────────────────
  notify:
    needs: [validate, build, deploy-dev, deploy-prod]
    if: always()
    runs-on: self-hosted
    steps:
      - name: Determine overall status
        id: status
        shell: bash
        run: |
          V="${{ needs.validate.result }}"
          B="${{ needs.build.result }}"
          DD="${{ needs.deploy-dev.result }}"
          DP="${{ needs.deploy-prod.result }}"

          if [ "$V" = "failure" ] || [ "$B" = "failure" ] || [ "$DD" = "failure" ] || [ "$DP" = "failure" ]; then
            echo "status=failure" >> "$GITHUB_OUTPUT"
            echo "emoji=❌" >> "$GITHUB_OUTPUT"
            echo "label=Failed" >> "$GITHUB_OUTPUT"
          elif [ "$V" = "cancelled" ] || [ "$B" = "cancelled" ] || [ "$DD" = "cancelled" ] || [ "$DP" = "cancelled" ]; then
            echo "status=cancelled" >> "$GITHUB_OUTPUT"
            echo "emoji=⚠" >> "$GITHUB_OUTPUT"
            echo "label=Cancelled" >> "$GITHUB_OUTPUT"
          else
            echo "status=success" >> "$GITHUB_OUTPUT"
            echo "emoji=✅" >> "$GITHUB_OUTPUT"
            echo "label=Success" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify Telegram (result)
        shell: bash
        run: |
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "parse_mode=HTML" \
            --data-urlencode "text=${{ steps.status.outputs.emoji }} <b>Build ${{ steps.status.outputs.label }}</b>
          Repo: ${{ github.repository }}
          Branch: <code>${{ github.ref_name }}</code>
          Actor: ${{ github.actor }}
          Commit: ${{ github.event.head_commit.message }}
          validate: ${{ needs.validate.result }}
          build: ${{ needs.build.result }}
          deploy-dev: ${{ needs.deploy-dev.result }}
          deploy-prod: ${{ needs.deploy-prod.result }}
          Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
